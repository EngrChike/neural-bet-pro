name: Neural-Update
on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run AI Script
        run: python scraper.py
      - name: Deploy Data
        run: |
          git config --global 
user.name "AI-Bot"
          git config --global 
user.email "bot@github.com"
          git add data.json
          git commit -m "Update"
          git push
