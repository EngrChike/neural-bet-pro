name: Neural-Update

on:
  schedule:
    - cron: '0 6,18 * * *' # Runs at 6 AM and 6 PM
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so git push works better

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests  # Keep this if your scraper uses an API

      - name: Run AI Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scraper.py

      - name: Deploy Data
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          # Pull first to avoid conflicts, then commit and push
          git pull origin main --rebase 
          git commit -m "Auto-update live predictions [skip ci]" || exit 0
          git push origin main
