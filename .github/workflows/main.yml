name: Neural-Update

on:
  schedule:
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run AI Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scraper.py

      - name: Deploy Data
        run: |
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git add data.json
          git commit -m "Auto-update live predictions" || exit 0
          git push
