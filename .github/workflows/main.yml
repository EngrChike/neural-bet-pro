name: Neural-Update

on:
  schedule:
    - cron: '0 6,18 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run AI Script
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scraper.py

      - name: Deploy Data
        run: |
          # 1. Identity & Trust
          git config --global user.name "AI-Bot"
          git config --global user.email "bot@github.com"
          git config --global --add safe.directory /github/workspace
          
          # 2. Stage the new data
          git add data.json
          
          # 3. Pull with "Ours" strategy (Always keep the robot's new data)
          git pull origin main --rebase -X ours
          
          # 4. Final Push
          git commit -m "Auto-update live predictions [skip ci]" || exit 0
          git push origin main
