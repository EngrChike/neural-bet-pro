<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-BET | ELITE AI</title>
    <style>
        :root { --blue: #00f2ff; --green: #39ff14; --gold: #ffcc00; --bg: #080a0c; --card: #12161d; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin:0; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #222; }
        .stat-pill { background: var(--green); color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }
        .section-title { color: var(--blue); font-size: 0.7rem; font-weight: 800; letter-spacing: 2px; margin: 20px 0 10px; display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #2a2f3a; }
        .game-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e232d; font-size: 0.9rem; }
        .pick { color: var(--green); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.5rem; font-weight: 900;">NEURAL<span style="color:var(--blue)">-BET</span></div>
        <div class="stat-pill" id="stats">0W - 0L</div>
    </div>

    <span class="section-title">TODAY'S 5-ODD SLIPS</span>
    <div class="card" style="border-left: 4px solid var(--gold);">
        <b style="color:var(--gold)">MORNING (AM)</b>
        <div id="am-box">Loading Morning Games...</div>
    </div>

    <div class="card" style="border-left: 4px solid var(--blue);">
        <b style="color:var(--blue)">EVENING (PM)</b>
        <div id="pm-box">Loading Evening Games...</div>
    </div>

    <span class="section-title">10-DAY ROADMAP (O2.5)</span>
    <div class="card" id="road-box">Loading Roadmap...</div>

    <script>
        // The '?v=' + Date.now() forces the browser to bypass the cache
        fetch('data.json?v=' + Date.now())
        .then(r => r.json())
        .then(data => {
            document.getElementById('stats').innerText = data.monthly_stats.wins + "W - " + data.monthly_stats.losses + "L";

            let amH = '';
            data.am_slip.forEach(g => { amH += `<div class="game-row"><span>${g.match}</span><span class="pick">${g.pick}</span></div>`; });
            document.getElementById('am-box').innerHTML = amH;

            let pmH = '';
            data.pm_slip.forEach(g => { pmH += `<div class="game-row"><span>${g.match}</span><span class="pick">${g.pick}</span></div>`; });
            document.getElementById('pm-box').innerHTML = pmH;

            let rdH = '';
            data.ten_day_runner.forEach(g => {
                rdH += `<div class="game-row"><span>${g.date} | ${g.match}</span><span style="color:var(--gold)">O2.5</span></div>`;
            });
            document.getElementById('road-box').innerHTML = rdH;
        })
        .catch(err => {
            document.body.innerHTML += `<p style="color:red; text-align:center;">DATABASE ERROR: Please run the GitHub Action to generate games!</p>`;
        });
    </script>
</body>
</html>
