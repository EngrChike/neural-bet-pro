<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-BET ELITE</title>
    <style>
        :root { --blue: #00d4ff; --gold: #f59e0b; --bg: #05070a; --card: #11141d; --green: #39ff14; }
        body { background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 15px; max-width: 500px; margin: auto; }
        
        .stat-bar { display: flex; justify-content: space-between; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; }
        .scout-card { background: rgba(0, 212, 255, 0.1); border: 1px solid var(--blue); padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; }
        
        .slip-box { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--gold); }
        .slip-title { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .road-item { background: #161b22; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="stat-bar">
        <div><small id="m-name">MONTH</small><br><b style="color:var(--blue)">PERFORMANCE</b></div>
        <div style="text-align:right"><b style="color:var(--green)" id="w-count">0</b> <small>W</small> | <b style="color:red" id="l-count">0</b> <small>L</small></div>
    </div>

    <div class="scout-card">
        <b style="color:var(--blue)">NEURAL SCOUT:</b> <span id="scout-report">Analyzing...</span>
    </div>

    <div class="slip-box">
        <div class="slip-title">MORNING 5-ODD (AM) <span>5.60 Odds</span></div>
        <div id="am-content"></div>
    </div>

    <div class="slip-box" style="border-left-color: var(--blue);">
        <div class="slip-title" style="color:var(--blue)">EVENING 5-ODD (PM) <span>5.15 Odds</span></div>
        <div id="pm-content"></div>
    </div>

    <h4 style="color:var(--blue); border-bottom: 1px solid #222; padding-bottom: 5px;">10-DAY ROADMAP (95% ACCURACY)</h4>
    <div id="roadmap-content"></div>

    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('m-name').innerText = data.current_month;
            document.getElementById('w-count').innerText = data.monthly_stats.wins;
            document.getElementById('l-count').innerText = data.monthly_stats.losses;
            document.getElementById('scout-report').innerText = `${data.scout.tactic} | Form: ${data.scout.form} | ${data.scout.scout_note}`;

            let amH = ''; data.am_slip.forEach(g => amH += `<div style="margin-bottom:4px;">${g.match} ➔ <b>${g.pick}</b></div>`);
            document.getElementById('am-content').innerHTML = amH;

            let pmH = ''; data.pm_slip.forEach(g => pmH += `<div style="margin-bottom:4px;">${g.match} ➔ <b>${g.pick}</b></div>`);
            document.getElementById('pm-content').innerHTML = pmH;

            let roadH = ''; data.ten_day_runner.forEach(g => {
                roadH += `<div class="road-item"><span>${g.date}</span><b>${g.match}</b><span style="color:var(--blue)">${g.pick}</span></div>`;
            });
            document.getElementById('roadmap-content').innerHTML = roadH;
        });
    </script>
</body>
</html>
