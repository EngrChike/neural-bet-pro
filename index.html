<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-BET | Elite AI</title>
    <style>
        :root { --neon-blue: #00f2ff; --neon-green: #39ff14; --neon-gold: #ffcc00; --dark-bg: #080a0c; --card-bg: #12161d; }
        body { background: var(--dark-bg); color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 15px; }
        
        /* Header & Stats */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--neon-blue); }
        .stat-pill { background: var(--neon-green); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; box-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

        /* Slip Containers */
        .section-label { color: var(--neon-blue); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 10px; display: block; }
        
        .slip-card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #2a2f3a; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .slip-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
        .am-card::before { background: var(--neon-gold); }
        .pm-card::before { background: var(--neon-blue); }

        .game-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e232d; }
        .game-row:last-child { border: none; }
        .match-name { font-weight: 600; font-size: 0.95rem; }
        .pick-badge { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); padding: 4px 8px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; border: 1px solid var(--neon-green); }

        /* Roadmap Styling */
        .roadmap-list { background: var(--card-bg); border-radius: 16px; border: 1px solid #2a2f3a; padding: 5px 15px; }
        .road-item { display: grid; grid-template-columns: 60px 1fr 60px; padding: 15px 0; border-bottom: 1px solid #1e232d; align-items: center; }
        .road-date { font-size: 0.75rem; color: #707785; }
        .road-match { font-weight: 500; text-align: center; font-size: 0.85rem; }
        .road-pick { color: var(--neon-gold); font-weight: 800; text-align: right; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NEURAL<span>-BET</span></div>
        <div class="stat-pill" id="stats">WINS: 0 | LOSS: 0</div>
    </div>

    <span class="section-label">Dual Slip Analysis</span>
    
    <div class="slip-card am-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b style="color:var(--neon-gold)">MORNING (AM) SLIP</b>
            <small style="color:#707785">5.50+ ODDS</small>
        </div>
        <div id="am-list"></div>
    </div>

    <div class="slip-card pm-card">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b style="color:var(--neon-blue)">EVENING (PM) SLIP</b>
            <small style="color:#707785">5.20+ ODDS</small>
        </div>
        <div id="pm-list"></div>
    </div>

    <span class="section-label">10-Day O2.5 Accumulator</span>
    <div class="roadmap-list" id="roadmap-list"></div>

    <script>
        // Adding a cache-buster to ensure fresh games every load
        fetch('data.json?nocache=' + new Date().getTime())
        .then(r => r.json())
        .then(data => {
            document.getElementById('stats').innerText = `WINS: ${data.monthly_stats.wins} | LOSSES: ${data.monthly_stats.losses}`;

            let amHtml = '';
            data.am_slip.forEach(g => {
                amHtml += `<div class="game-row"><div class="match-name">${g.match}</div><div class="pick-badge">${g.pick}</div></div>`;
            });
            document.getElementById('am-list').innerHTML = amHtml;

            let pmHtml = '';
            data.pm_slip.forEach(g => {
                pmHtml += `<div class="game-row"><div class="match-name">${g.match}</div><div class="pick-badge">${g.pick}</div></div>`;
            });
            document.getElementById('pm-list').innerHTML = pmHtml;

            let rdHtml = '';
            data.ten_day_runner.forEach(g => {
                rdHtml += `<div class="road-item">
                    <div class="road-date">${g.date}</div>
                    <div class="road-match">${g.match}</div>
                    <div class="road-pick">OVER 2.5</div>
                </div>`;
            });
            document.getElementById('roadmap-list').innerHTML = rdHtml;
        })
        .catch(err => console.error("Data Error:", err));
    </script>
</body>
</html>
