<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEURAL-BET PRO | Elite Accumulator</title>
    <style>
        :root { --blue: #00d4ff; --green: #39ff14; --gold: #f59e0b; --bg: #05070a; --card: #11141d; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; padding: 15px; max-width: 500px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-stat { background: var(--green); color: black; padding: 5px 12px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }

        .section-label { color: var(--blue); font-size: 0.7rem; letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; display: block; }
        
        .slip-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 4px solid var(--blue); }
        .game-row { border-bottom: 1px solid #222; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }

        .roadmap-box { background: #161b22; border-radius: 12px; padding: 15px; border: 1px solid #334; }
        .road-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>NEURAL-BET</h1>
        <div class="month-stat" id="stat-display">0W - 0L</div>
    </div>

    <span class="section-label">DAILY 5-ODD SLIPS</span>
    
    <div class="slip-card" style="border-left-color: var(--gold);">
        <b style="color:var(--gold)">MORNING (AM) SLIP</b>
        <div id="am-list"></div>
    </div>

    <div class="slip-card">
        <b>EVENING (PM) SLIP</b>
        <div id="pm-list"></div>
    </div>

    <span class="section-label">10-DAY ACCUMULATION ROADMAP</span>
    <div class="roadmap-box" id="roadmap-list"></div>

    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            document.getElementById('stat-display').innerText = data.monthly_stats.wins + "W - " + data.monthly_stats.losses + "L";

            // AM List
            let amH = ''; data.am_slip.forEach(g => {
                amH += `<div class="game-row"><span>${g.match}</span><b style="color:var(--green)">${g.pick}</b></div>`;
            });
            document.getElementById('am-list').innerHTML = amH;

            // PM List
            let pmH = ''; data.pm_slip.forEach(g => {
                pmH += `<div class="game-row"><span>${g.match}</span><b style="color:var(--blue)">${g.pick}</b></div>`;
            });
            document.getElementById('pm-list').innerHTML = pmH;

            // Roadmap
            let rdH = ''; data.ten_day_runner.forEach(g => {
                rdH += `<div class="road-item">
                    <span>${g.date}</span>
                    <b>${g.match}</b>
                    <span style="color:var(--gold)">O2.5</span>
                </div>`;
            });
            document.getElementById('roadmap-list').innerHTML = rdH;
        });
    </script>
</body>
</html>
